<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Pallet System</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
</head>

<body>
    <div id="offline-banner" class="offline hidden">⚠️ Modo offline</div>

    <header>
        <div class="header-top">
            <h1>📦 Pallet System</h1>
            <button class="theme-toggle" id="theme-toggle" aria-label="Alternar tema">🌙</button>
        </div>
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="pallets">PALLETS</button>
            <button class="tab-btn" data-tab="agendamentos">AGENDAMENTOS</button>
            <button class="tab-btn" data-tab="finalizados">FINALIZADOS</button>
        </div>
    </header>

    <main>
        <section id="pallets-tab" class="tab-content active">
            <div class="filters">
                <input type="text" id="search-nf" placeholder="🔍 Buscar Número Fiscal">
            </div>

            <button id="create-pallet-btn" class="btn-primary">+ NOVO PALLET</button>

            <div id="pallets-list"></div>
        </section>

        <section id="agendamentos-tab" class="tab-content">
            <h2>Agendamentos</h2>
            <div class="filters">
                <input type="text" id="search-agendamentos" placeholder="🔍 Pesquisar agendamentos...">
            </div>
            <div id="agendamentos-list"></div>
        </section>

        <section id="finalizados-tab" class="tab-content">
            <h2>Pallets Finalizados</h2>
            <div class="filters">
                <input type="text" id="search-finalizados" placeholder="🔍 Buscar NF ou Recebedor">
                <button id="clear-history" class="btn-secondary">Limpar Histórico</button>
            </div>
            <div id="finalizados-list"></div>
        </section>
    </main>

    <div id="pallet-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Novo Pallet</h3>
            <form id="pallet-form">
                <div class="tipo-selector">
                    <label>Tipo de Pallet</label>
                    <select id="pallet-tipo" required>
                        <option value="VOLUMETRIA_ALTA">📦 Volumetria Alta (+20 volumes)</option>
                        <option value="DIVERSOS">📦 Diversos</option>
                    </select>
                </div>

                <div class="scan-options">
                    <button type="button" id="scan-btn-modal" class="btn-secondary" style="margin: 0;">📷 ESCANEAR
                        SELO</button>
                    <button type="button" id="import-img-btn" class="btn-secondary" style="margin: 0;">📁 IMPORTAR
                        FOTO</button>
                </div>

                <div id="volumetria-campos">
                    <input type="text" id="nf" placeholder="Número Fiscal" autocomplete="off">
                    <input type="text" id="recebedor" placeholder="Recebedor" autocomplete="off">
                    <input type="text" id="estado" placeholder="UF" maxlength="2" autocomplete="off">
                    <input type="text" id="cidade" placeholder="Cidade" autocomplete="off">
                    <input type="text" id="regiao" placeholder="Região / Unidade" autocomplete="off">
                    <input type="text" id="subregiao" placeholder="Sub-região (número)" autocomplete="off">
                    <input type="number" id="maxVolumes" placeholder="Volumes Totais" min="1" autocomplete="off">
                </div>

                <!-- Campos Diversos -->
                <div id="diversos-campos" style="display: none;">
                    <input type="text" id="diversos-regiao" placeholder="Região / Unidade" autocomplete="off">
                    <input type="text" id="diversos-subregiao" placeholder="Sub-região (número ou texto)"
                        autocomplete="off">
                    <input type="text" id="diversos-estado" placeholder="UF" maxlength="2" autocomplete="off">
                </div>

                <div class="form-actions">
                    <button type="submit">Criar Pallet</button>
                    <button type="button" id="close-modal">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <div id="ajustar-modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="ajustar-modal-title">Ajustar Pallet</h3>
            <div id="ajustar-info"></div>

            <div id="volume-controls-container" class="volume-controls">
            </div>

            <div class="volume-actions">
                <button id="save-volume" class="btn-primary" style="display: none;">Salvar Volumes</button>
                <button id="finalize-from-ajustar" class="btn-warning">Finalizar Pallet</button>
                <button id="delete-from-ajustar" class="btn-danger">Excluir Pallet</button>
                <button id="close-ajustar-modal" class="btn-secondary">Fechar</button>
            </div>
        </div>
    </div>

    <div id="finalizar-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Finalizar Pallet</h3>
            <p id="finalizar-pergunta">Todos os volumes foram bipados?</p>
            <div class="finalizar-actions">
                <button id="confirm-finalizar-sim" class="btn-success">SIM ✅</button>
                <button id="confirm-finalizar-nao" class="btn-danger">NÃO ❌</button>
                <button id="cancel-finalizar" class="btn-secondary">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="codigo-lista-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Código da Lista de QR Codes</h3>
            <p>Digite o código da lista gerada pelo aplicativo (opcional)</p>
            <input type="text" id="codigo-lista-input" placeholder="Ex: 100000095216969"
                style="width: 100%; padding: 15px; margin: 15px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; font-family: monospace;">
            <div class="form-actions">
                <button id="confirmar-imprimir-codigo" class="btn-primary">Imprimir com Código</button>
                <button id="imprimir-sem-codigo" class="btn-secondary">Imprimir sem Código</button>
                <button id="cancelar-codigo-modal" class="btn-danger">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="camera-modal" class="modal hidden">
        <div class="modal-content" style="padding: 20px;">
            <h3>📷 Escanear Selo</h3>
            <video id="camera-video" autoplay playsinline
                style="width: 100%; border-radius: 12px; margin: 10px 0;"></video>
            <canvas id="camera-canvas" style="display: none;"></canvas>
            <div class="form-actions">
                <button id="capture-photo" class="btn-primary">📸 TIRAR FOTO</button>
                <button id="close-camera" class="btn-secondary">FECHAR</button>
            </div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="palletService.js"></script>
    <script src="agendamentoService.js"></script>
    <script src="ocr-service.js"></script>
    <script src="app.js"></script>
</body>

</html>
